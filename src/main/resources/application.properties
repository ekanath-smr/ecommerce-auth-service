# =========================
# Application
# =========================
spring.application.name=ecommerce-auth-service
server.port=${SERVER_PORT}

# =========================
# Database Configuration
# =========================
spring.datasource.url=jdbc:mysql://localhost:3306/authService
spring.datasource.username=authServiceUser
#spring.datasource.password=yourpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================
# JPA / Hibernate
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# =========================
# Actuator (Health Monitoring)
# =========================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# =========================
# JWT Security Configuration
# =========================
jwt.secret=e+4GyEUY2A7k4r1TtEXBFCTg/u0SRs/e9WIdpee2FAE=
jwt.access-expiration=900000
jwt.refresh-expiration=604800000

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true